services:
  - type: web
    name: bizcrm
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.render
    healthCheckPath: /up
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_TIMEZONE
        value: Asia/Baku
      - key: LOG_CHANNEL
        value: stderr
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: DB_CONNECTION
        value: pgsql
      - fromDatabase:
          name: bizcrm-db
          property: host
        key: DB_HOST
      - fromDatabase:
          name: bizcrm-db
          property: port
        key: DB_PORT
      - fromDatabase:
          name: bizcrm-db
          property: database
        key: DB_DATABASE
      - fromDatabase:
          name: bizcrm-db
          property: user
        key: DB_USERNAME
      - fromDatabase:
          name: bizcrm-db
          property: password
        key: DB_PASSWORD

databases:
  - name: bizcrm-db
    plan: free
    databaseName: bizcrm
    ipAllowList: []
